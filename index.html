<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Mobile FPS - Step 6 (Centered Hands)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; user-select: none; -webkit-user-select: none; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #multiplayer-ui { position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.7); color: white; padding: 10px; border-radius: 8px; font-family: sans-serif; font-size: 12px; z-index: 20; max-width: 280px; }
        #multiplayer-ui input { width: 120px; font-size: 11px; }
        #multiplayer-ui button { font-size: 11px; margin-left: 5px; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; touch-action: none; display: flex; align-items: center; justify-content: center; z-index: 10; border: 1px solid rgba(255,255,255,0.2); }
        #joystick-knob { width: 50px; height: 50px; background: rgba(255, 255, 255, 0.5); border-radius: 50%; position: relative; pointer-events: none; }
        #fire-button { position: absolute; bottom: 60px; right: 40px; width: 90px; height: 90px; background: rgba(255, 50, 50, 0.6); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; text-align: center; line-height: 86px; color: white; font-family: sans-serif; font-weight: bold; font-size: 20px; touch-action: none; z-index: 10; box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); }
        #fire-button:active { background: rgba(255, 0, 0, 0.8); transform: scale(0.95); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: white; }
        #crosshair::before { top: 6px; left: 0; width: 14px; height: 2px; }
        #crosshair::after { left: 6px; top: 0; width: 2px; height: 14px; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="multiplayer-ui">
        <div>Status: <span id="network-status" style="color: #ffa500;">Connecting...</span></div>
        <div style="margin-top: 5px;">Your ID: <span id="my-id" style="font-weight:bold; color:#2ed573;">...</span></div>
        <div style="margin-top: 5px;">
            <input type="text" id="peer-id-input" placeholder="Paste Friend ID">
            <button id="connect-btn">Connect</button>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div id="fire-button">FIRE</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. BASIC WORLD SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // Dark tactical indigo sky

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5); 
        camera.rotation.order = 'YXZ';
        scene.add(camera); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.7);
        directionalLight.position.set(5, 10, 7);
        scene.add(directionalLight);

        // Environment grid and a simple structure
        const gridHelper = new THREE.GridHelper(60, 60, 0x444444, 0x222222);
        scene.add(gridHelper);
        
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const structure = new THREE.Mesh(new THREE.BoxGeometry(10, 4, 1), obstacleMat);
        structure.position.set(0, 2, -10);
        scene.add(structure);

        // --- 2. THE WEAPON & HANDS (VIEW MODEL) SETUP ---
        // Create a parent container for the whole view model (hands + gun)
        const viewModelGroup = new THREE.Group();
        camera.add(viewModelGroup); // Attached to camera

        // Materials
        const gunMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.7 });
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x95a5a6, metalness: 0.8 });
        // Use a desaturated dark orange/peach for armored tactical gloves
        const gloveMat = new THREE.MeshStandardMaterial({ color: 0xb58f70, roughness: 1.0 });

        // -- The Gun --
        const gunBodyGeo = new THREE.BoxGeometry(0.06, 0.08, 0.35);
        const gunBody = new THREE.Mesh(gunBodyGeo, gunMat);
        gunBody.position.set(0, 0, -0.15); // Origin at back
        viewModelGroup.add(gunBody);

        const barrelGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.2);
        const barrel = new THREE.Mesh(barrelGeo, metalMat);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 0.01, -0.32);
        viewModelGroup.add(barrel);

        const flashGeo = new THREE.SphereGeometry(0.06, 8, 8);
        const muzzleFlash = new THREE.Mesh(flashGeo, new THREE.MeshBasicMaterial({ color: 0xf1c40f }));
        muzzleFlash.position.set(0, 0.01, -0.42);
        muzzleFlash.visible = false;
        viewModelGroup.add(muzzleFlash);

        // -- The Hands (Gloves) --
        const handGeo = new THREE.BoxGeometry(0.07, 0.07, 0.1);
        
        // Right hand (holding grip)
        const rightHand = new THREE.Mesh(handGeo, gloveMat);
        rightHand.position.set(0.03, -0.06, -0.05); // Offset to side/bottom
        rightHand.rotation.x = 0.2; // slight angle
        viewModelGroup.add(rightHand);

        // Left hand (foregrip supporting underneath)
        const leftHand = new THREE.Mesh(handGeo, gloveMat);
        leftHand.position.set(0, -0.07, -0.22); // underneath the barrel
        leftHand.rotation.x = -0.1;
        viewModelGroup.add(leftHand);

        // -- View Model Idle Positioning --
        // Gun is centered horizontally (x=0), slightly down from camera center (y=-0.2)
        // Adjust these numbers until the gun points exactly at the crosshair
        const idleViewX = 0;
        const idleViewY = -0.22;
        const idleViewZ = -0.5; // distance from lens

        viewModelGroup.position.set(idleViewX, idleViewY, idleViewZ);


        // --- 3. MULTIPLAYER SETUP ---
        const remotePlayerMesh = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 1.2), new THREE.MeshStandardMaterial({ color: 0x00a8ff }));
        remotePlayerMesh.position.y = -20; // Hide until connect
        scene.add(remotePlayerMesh);

        let peer = new Peer(); let connection = null;
        const statusEl = document.getElementById('network-status');

        peer.on('open', (id) => { statusEl.innerText = "Ready"; document.getElementById('my-id').innerText = id; });
        document.getElementById('connect-btn').addEventListener('click', () => {
            const targetId = document.getElementById('peer-id-input').value.trim();
            if (targetId) { setupConnection(peer.connect(targetId)); }
        });
        peer.on('connection', (conn) => setupConnection(conn));

        function setupConnection(conn) {
            connection = conn;
            connection.on('open', () => { statusEl.innerText = "Connected!"; remotePlayerMesh.position.y = 1; });
            connection.on('data', (data) => {
                if (data.type === 'move') { remotePlayerMesh.position.set(data.pos.x, data.pos.y, data.pos.z); remotePlayerMesh.rotation.y = data.rotY; }
                if (data.type === 'hit') { document.body.style.backgroundColor = "rgba(255,0,0,0.5)"; setTimeout(() => document.body.style.backgroundColor = "#111", 70); }
            });
            connection.on('close', () => { statusEl.innerText = "Player Left"; remotePlayerMesh.position.y = -20; });
        }


        // --- 4. SHOOTING & RECOIL ---
        const raycaster = new THREE.Raycaster();
        const centerScreen = new THREE.Vector2(0, 0); 
        let isRecoiling = false;

        function shoot() {
            if (isRecoiling) return;
            muzzleFlash.visible = true;
            setTimeout(() => { muzzleFlash.visible = false; }, 40);

            // Trigger Recoil Animation using basic linear math
            isRecoiling = true;
            let kickback = 0.06; // kick backward
            let flip = 0.04; // kick upward
            
            viewModelGroup.position.z += kickback;
            viewModelGroup.position.y += flip;
            
            // Linear recovery after 110ms
            setTimeout(() => {
                viewModelGroup.position.y -= flip;
                viewModelGroup.position.z -= kickback;
                isRecoiling = false;
            }, 110);

            // Network Raycast
            raycaster.setFromCamera(centerScreen, camera);
            if (raycaster.intersectObject(remotePlayerMesh).length > 0) {
                remotePlayerMesh.material.color.setHex(0xff4757); // Flash red on our screen
                setTimeout(() => remotePlayerMesh.material.color.setHex(0x00a8ff), 120);
                if (connection && connection.open) connection.send({ type: 'hit' });
            }
        }


        // --- 5. TOUCH INPUT CONTROLS ---
        const moveInput = { x: 0, y: 0 }; const moveSpeed = 0.085; const lookSensitivity = 0.0055;
        let joystickTouchId = null; let lookTouchId = null;
        let lastLookTouchX = 0; let lastLookTouchY = 0;

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        const joystickRect = joystickZone.getBoundingClientRect();
        const joystickCenter = { x: joystickRect.left + joystickRect.width/2, y: joystickRect.top + joystickRect.height/2 };

        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.target === document.getElementById('fire-button')) { shoot(); continue; }
                const dx = touch.clientX - joystickCenter.x; const dy = touch.clientY - joystickCenter.y;
                if (Math.sqrt(dx*dx + dy*dy) < 80 && joystickTouchId === null) { joystickTouchId = touch.identifier; handleJoystickMove(touch); }
                else if (lookTouchId === null) { lookTouchId = touch.identifier; lastLookTouchX = touch.clientX; lastLookTouchY = touch.clientY; }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === joystickTouchId) handleJoystickMove(touch);
                if (touch.identifier === lookTouchId) handleLookMove(touch);
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === joystickTouchId) { joystickTouchId = null; moveInput.x = 0; moveInput.y = 0; joystickKnob.style.transform = `translate(0px, 0px)`; }
                if (touch.identifier === lookTouchId) lookTouchId = null;
            }
        });

        function handleJoystickMove(touch) {
            let dx = touch.clientX - joystickCenter.x; let dy = touch.clientY - joystickCenter.y;
            const dist = Math.sqrt(dx*dx + dy*dy); const maxRad = 40;
            if (dist > maxRad) { dx = (dx/dist)*maxRad; dy = (dy/dist)*maxRad; }
            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            moveInput.x = dx / maxRad; moveInput.y = dy / maxRad;
        }

        function handleLookMove(touch) {
            const dx = touch.clientX - lastLookTouchX; const dy = touch.clientY - lastLookTouchY;
            camera.rotation.y -= dx * lookSensitivity; camera.rotation.x -= dy * lookSensitivity;
            camera.rotation.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, camera.rotation.x));
            lastLookTouchX = touch.clientX; lastLookTouchY = touch.clientY;
        }


        // --- 6. GAME ENGINE LOOP ---
        let networkTick = 0;
        let walkCycle = 0; // Tracks walk cycle time for bobbing sine wave
        const clock = new THREE.Clock(); // Required to track precise time between frames

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta(); // Time elapsed since last frame
            
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0; right.y = 0; forward.normalize(); right.normalize();

            let isMoving = false;
            if (moveInput.x !== 0 || moveInput.y !== 0) {
                camera.position.addScaledVector(forward, -moveInput.y * moveSpeed);
                camera.position.addScaledVector(right, moveInput.x * moveSpeed);
                isMoving = true;
            }

            // --- PROCEDURAL WALK BOBBING ANIMATION (sine waves) ---
            const bobFrequency = 11; // Cycles per second (speed of steps)
            const bobAmountY = 0.005; // Up/down amplitude
            const bobAmountX = 0.003; // Slight side-to-side shift

            let targetBobY = idleViewY;
            let targetBobX = idleViewX;

            if (isMoving) {
                walkCycle += deltaTime * bobFrequency;
                // Vertical Bob (Up and Down sine wave)
                targetBobY += Math.sin(walkCycle) * bobAmountY;
                // Horizontal Sway (Side to side cosine wave at half frequency)
                targetBobX += Math.cos(walkCycle / 2) * bobAmountX;
            } else {
                // Quickly lerp (reset) back to exact center if stopped
                walkCycle = 0; 
            }

            // Apply calculated bobbing position to the view model group,
            // unless we are currently recoiling from a shot.
            if (!isRecoiling) {
                // Apply subtle lerping to smooth the transition
                viewModelGroup.position.y = THREE.MathUtils.lerp(viewModelGroup.position.y, targetBobY, 0.2);
                viewModelGroup.position.x = THREE.MathUtils.lerp(viewModelGroup.position.x, targetBobX, 0.2);
            }

            // Network Sync (30 Hz)
            networkTick++;
            if (networkTick % 2 === 0 && connection && connection.open) {
                connection.send({ type: 'move', pos: { x: camera.position.x, y: camera.position.y - 0.6, z: camera.position.z }, rotY: camera.rotation.y });
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
